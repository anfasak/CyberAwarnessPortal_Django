<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Awareness Portal</title>

    <style>
        body {
            margin: 0;
            padding: 40px;
            background: #0D1117;
            font-family: "Segoe UI", sans-serif;
            color: #ffffff;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #00e6ff;
            letter-spacing: 1px;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: #161B22;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 230, 255, 0.15);
        }

        th {
            background: #00e6ff;
            color: #000;
            padding: 15px;
            text-align: left;
            font-size: 16px;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #30363D;
            font-size: 15px;
        }

        tr:hover {
            background: rgba(0, 230, 255, 0.08);
        }

        td a {
            color: #00e6ff;
            text-decoration: none;
            font-weight: 500;
        }

        td a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            table {
                width: 100%;
            }

            th, td {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <h2>⚠ Cyber Awareness</h2>

    <table>
        <tr>
            <th>Content</th>
            <th>Threat Type</th>
            <th>Description</th>
            <th>Image</th>
            <th>Link</th>
            <th> <a href="/Add_learn_modules"> <button>add</button></a></th>

        </tr>

        {% for i in w %}
        <tr>
            <td>{{ i.Content }}</td>
            <td>{{i.ThreatType}}</td>
            <td>{{i.Description}}</td>
            <td>
    <a href="{{ i.image.url }}" target="_blank">view</a>
</td>

            <td>
             <a href=" {{i.Link}}" target="_blank">view</a>
            </td>
            <td>
                <a href="/DeleteLink/{{i.id}}"><button>Delete</button></a></td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
