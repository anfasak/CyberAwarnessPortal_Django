{% extends "admin_home.html" %}

{% block content %}

<style>
    /* ===== Page Title ===== */
    h2 {
        width: 95%;
        margin: 0 auto 25px auto;
        font-size: 24px;
        font-weight: 600;
        color: #0f172a;
    }

    /* ===== Table ===== */
    table {
        width: 95%;
        margin: auto;
        border-collapse: collapse;
        background: #ffffff;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid #e2e8f0;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
    }

    /* ===== Table Header ===== */
    th {
        background: #f8fafc;
        color: #64748b;
        padding: 16px;
        text-align: left;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-bottom: 1px solid #e2e8f0;
        white-space: nowrap;
    }

    th:last-child {
        text-align: center;
    }

    /* ===== Table Body ===== */
    td {
        padding: 16px;
        font-size: 14px;
        color: #334155;
        border-bottom: 1px solid #f1f5f9;
        vertical-align: top;
    }

    td:last-child {
        text-align: center;
    }

    tr:last-child td {
        border-bottom: none;
    }

    /* ===== Row Hover ===== */
    tbody tr {
        transition: 0.2s ease;
    }

    tbody tr:hover {
        background: #f1f5ff;
    }

    /* ===== Links ===== */
    td a {
        color: #4f46e5;
        text-decoration: none;
        font-weight: 500;
    }

    td a:hover {
        text-decoration: underline;
    }

    /* ===== Buttons Base ===== */
    button {
        padding: 8px 16px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        transition: 0.2s ease;
    }

    /* ===== Add Button ===== */
    th button {
        background: #10b981;
        color: #ffffff;
    }

    th button:hover {
        background: #059669;
        transform: translateY(-1px);
    }

    /* ===== Delete Button ===== */
    td button {
        background: #ef4444;
        color: #ffffff;
    }

    td button:hover {
        background: #dc2626;
        transform: translateY(-1px);
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
        table {
            width: 100%;
        }

        th, td {
            font-size: 13px;
            padding: 12px;
        }
    }
</style>

<h2>⚠ Cyber Awareness</h2>

<table>
    <tr>
        <th>SI.No</th>
        <th>Content</th>
        <th>Threat Type</th>
        <th>Description</th>
        <th>Image</th>
        <th>Link</th>
        <th>
            <a href="/Add_learn_modules">
                <button>Add</button>
            </a>
        </th>
    </tr>

    {% for i in w %}
    <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ i.Content }}</td>
        <td>{{ i.ThreatType }}</td>
        <td>{{ i.Description }}</td>
        <td>
            <a href="{{ i.image.url }}" target="_blank">View</a>
        </td>
        <td>
            <a href="{{ i.Link }}" target="_blank">View</a>
        </td>
        <td>
            <a href="/DeleteLink/{{ i.id }}">
                <button>Delete</button>
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
