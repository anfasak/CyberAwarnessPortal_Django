{% extends "admin_home.html" %}

{% block content %}

<style>

/* ===== Page Header ===== */
.page-header {
    width: 95%;
    margin: 0 auto 25px auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.page-header h2 {
    font-size: 24px;
    font-weight: 600;
    color: #0f172a;
}

/* ===== Table Card ===== */
.table-wrapper {
    width: 95%;
    margin: auto;
    background: #ffffff;
    border-radius: 16px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    overflow: hidden;
}

/* ===== Table ===== */
table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #f8fafc;
}

th {
    padding: 16px;
    font-size: 12px;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: left;
    border-bottom: 1px solid #e2e8f0;
}

td {
    padding: 18px 16px;
    font-size: 14px;
    color: #334155;
    border-bottom: 1px solid #f1f5f9;
}

tbody tr {
    transition: 0.2s ease;
}

tbody tr:hover {
    background: #f1f5ff;
}

/* ===== Rating Badge ===== */
.rating-badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 20px;
    background: #eef2ff;
    color: #4f46e5;
    font-weight: 600;
    font-size: 13px;
}

/* ===== Date Styling ===== */
.date-text {
    color: #64748b;
    font-size: 13px;
}

/* ===== Empty State ===== */
.empty-row {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
    font-size: 14px;
}

/* ===== Responsive ===== */
@media(max-width: 768px) {
    .page-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    th, td {
        padding: 14px;
        font-size: 13px;
    }
}

</style>


<div class="page-header">
    <h2>Feedback History</h2>
</div>

<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>SI.No</th>
                <th>Name</th>
                <th>Rating</th>
                <th>Feedback</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody>
            {% for i in a %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ i.User.Name }}</td>
                <td>
                    <span class="rating-badge">
                        ⭐ {{ i.Rating }}
                    </span>
                </td>
                <td>{{ i.Feedback }}</td>
                <td class="date-text">{{ i.Date }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="empty-row">
                    No feedback available.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
