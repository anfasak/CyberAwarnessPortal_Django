<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Quiz Question</title>

    <style>
        body {
            background: #F8FAFC; /* Main BG */
            font-family: Arial, sans-serif;
            color: #020617; /* Text Dark */
            padding: 30px;
        }

        h2 {
            text-align: center;
            color: #020617; /* Text Dark */
            margin-bottom: 25px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: #FFFFFF; /* Card */
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #E5E7EB;
            box-shadow: 0 10px 25px rgba(2, 6, 23, 0.08);
        }

        label {
            margin-top: 12px;
            display: block;
            font-size: 14px;
            color: #020617; /* Text Dark */
            font-weight: 600;
        }

        input, textarea, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            font-size: 14px;
        }

        input, textarea, select {
            background: #FFFFFF;
            color: #020617; /* Text Dark */
            border: 1px solid #CBD5E1;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #0EA5E9; /* Primary */
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.15);
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            background: #0EA5E9; /* Primary */
            color: #FFFFFF;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            border: none;
            transition: 0.3s;
        }

        button:hover {
            background: #0284C7;
        }
    </style>
</head>
<body>

<h2>Add Quiz Question (Admin)</h2>

<div class="container">
    <form method="post">
        <label>Question</label>
        <textarea name="question" placeholder="Enter quiz question"></textarea>

        <label>Option A</label>
        <input type="text" name="option1" placeholder="Option A">

        <label>Option B</label>
        <input type="text" name="option2" placeholder="Option B">

        <label>Option C</label>
        <input type="text" name="option3" placeholder="Option C">

        <label>Answer</label>
        <input type="text" name="answer" placeholder="answer">

        <button type="submit">Add Question</button>
    </form>
</div>

</body>
</html>
