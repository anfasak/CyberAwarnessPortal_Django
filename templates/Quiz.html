<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Quiz Question</title>

    <style>
        body {
            background: #0D1117;
            font-family: Arial, sans-serif;
            color: white;
            padding: 30px;
        }

        h2 {
            text-align: center;
            color: #00E5FF;
            margin-bottom: 25px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: #161B22;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,229,255,0.25);
        }

        label {
            margin-top: 12px;
            display: block;
            font-size: 14px;
            color: #C9D1D9;
        }

        input, textarea, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
        }

        input, textarea, select {
            background: #0D1117;
            color: white;
            border: 1px solid #00E5FF55;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            background: #00E5FF;
            color: black;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        button:hover {
            background: #00c8e0;
        }
    </style>
</head>
<body>

<h2>Add Quiz Question (Admin)</h2>

<div class="container">
    <form method="post">
        <label>Question</label>
        <textarea  name="question" placeholder="Enter quiz question"></textarea>

        <label>Option A</label>
        <input type="text" name="option1" placeholder="Option A">

        <label>Option B</label>
        <input type="text" name="option2" placeholder="Option B">

        <label>Option C</label>
        <input type="text" name="option3" placeholder="Option C">

        <label>Answer</label>
        <input type="text" name="answer" placeholder="answer">

    
        <button type="submit">Add Question</button>
    </form>
</div>

</body>
</html>
