<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Learning Search</title>

    <style>
        body {
            margin: 0;
            padding: 30px;
            background: linear-gradient(135deg, #0D1117, #111827);
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: #ffffff;
        }

        .search-box {
            max-width: 1000px;
            margin: auto;
            background: #161B22;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.25);
        }

        h2 {
            text-align: center;
            color: #00E5FF;
            margin-bottom: 30px;
            font-size: 26px;
        }

        form {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        select {
            width: 280px;
            padding: 12px;
            background: #0D1117;
            color: white;
            border: 1px solid #00E5FF55;
            border-radius: 10px;
        }

        input[type="submit"] {
            padding: 12px 30px;
            background: #00E5FF;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .video-card {
            background: #0D1117;
            padding: 18px;
            border-radius: 14px;
            margin-bottom: 30px;
            box-shadow: 0 0 18px rgba(0, 229, 255, 0.25);
        }

        iframe {
            width: 100%;
            height: 380px;
            border-radius: 12px;
            border: 2px solid #00E5FF33;
        }

        .no-data {
            text-align: center;
            color: gray;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            iframe {
                height: 240px;
            }
        }
    </style>
</head>

<body>

<div class="search-box">
    <h2>▶ YouTube Learning Search</h2>

    <form method="get">
        <select name="ThreatType">
            <option value="">-- Select Threat Type --</option>
            <option value="Phishing">Phishing</option>
            <option value="Fake Website">Fake Website</option>
            <option value="Fraud Call">Fraud Call</option>
            <option value="Malware Link">Malware Link</option>
            <option value="Social Media Scam">Social Media Scam</option>
        </select>
        <input type="submit" value="Search">
    </form>

    {% for i in ww %}
    <div class="video-card">
        <iframe
            src="https://www.youtube.com/embed/{{ i.Link }}"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>
    {% empty %}
    <div class="no-data">No videos found</div>
    {% endfor %}
</div>

</body>
</html>
