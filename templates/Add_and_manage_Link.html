{% extends "admin_home.html" %}

{% block content %}

<style>
    /* ===== Page Title ===== */
    h2 {
        width: 95%;
        margin: 0 auto 22px auto;
        color: #020617;
        font-weight: 700;
        letter-spacing: 0.4px;
        text-align: left;
        font-size: 20px;
    }

    /* ===== Card Container ===== */
    .search-box {
        width: 95%;
        margin: auto;
        background: #FFFFFF;
        padding: 26px;
        border-radius: 18px;
        border: 1px solid #E5E7EB;
        box-shadow:
            0 10px 25px rgba(2, 6, 23, 0.08),
            0 2px 6px rgba(2, 6, 23, 0.04);
    }

    /* ===== Search Form ===== */
    form {
        display: flex;
        gap: 14px;
        align-items: center;
        margin-bottom: 26px;
        flex-wrap: wrap;
    }

    select {
        width: 280px;
        padding: 11px 12px;
        background: #F8FAFC;
        color: #020617;
        border: 1px solid #CBD5E1;
        border-radius: 10px;
        font-size: 14px;
        outline: none;
        transition: 0.2s ease;
    }

    select:focus {
        border-color: #0EA5E9;
        box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.18);
        background: #FFFFFF;
    }

    input[type="submit"] {
        padding: 11px 26px;
        background: #0EA5E9;
        border: none;
        border-radius: 10px;
        color: #FFFFFF;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s ease;
    }

    input[type="submit"]:hover {
        background: #0284C7;
        transform: translateY(-1px);
    }

    /* ===== Video Card ===== */
    .video-card {
        background: #FFFFFF;
        padding: 18px;
        border-radius: 16px;
        margin-bottom: 26px;
        border: 1px solid #E5E7EB;
        box-shadow:
            0 8px 18px rgba(2, 6, 23, 0.06);
    }

    iframe {
        width: 100%;
        height: 380px;
        border-radius: 14px;
        border: 1px solid #E5E7EB;
        background: #000;
    }

    /* ===== Empty State ===== */
    .no-data {
        text-align: center;
        color: #64748B;
        margin-top: 32px;
        font-size: 14px;
        padding: 20px 0;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
        iframe {
            height: 240px;
        }

        h2 {
            font-size: 18px;
        }
    }
</style>

<h2>▶ YouTube Learning Search</h2>

<div class="search-box">

    <form method="get">
        <select name="ThreatType">
            <option value="">-- Select Threat Type --</option>
            <option value="Phishing">Phishing</option>
            <option value="Fake Website">Fake Website</option>
            <option value="Fraud Call">Fraud Call</option>
            <option value="Malware Link">Malware Link</option>
            <option value="Social Media Scam">Social Media Scam</option>
        </select>
        <input type="submit" value="Search">
    </form>

    {% for i in ww %}
    <div class="video-card">
        <iframe
            src="https://www.youtube.com/embed/{{ i.Link }}"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>
    {% empty %}
    <div class="no-data">No videos found</div>
    {% endfor %}

</div>

{% endblock %}
