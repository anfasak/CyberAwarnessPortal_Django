<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Content</title>

    <style>
        body {
            margin: 0;
            padding: 40px;
            background-color: #F8FAFC;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #020617;
        }

        h2 {
            text-align: center;
            color: #0EA5E9;
            margin-bottom: 30px;
        }

        table {
            margin: auto;
            background-color: #FFFFFF;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(2, 6, 23, 0.08);
            width: 60%;
            border: 1px solid #E5E7EB;
        }

        td {
            padding: 12px;
            font-size: 15px;
            color: #020617;
        }

        input[type="text"],
        input[list],
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #CBD5E1;
            background-color: #F8FAFC;
            color: #020617;
            font-size: 14px;
        }

        input::placeholder,
        textarea::placeholder {
            color: #64748B;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #0EA5E9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2);
            background: #FFFFFF;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        .description-box {
            height: 120px;
        }

        .submit-btn {
            text-align: center;
            padding-top: 20px;
        }

        button {
            background-color: #10B981;
            color: #FFFFFF;
            border: none;
            padding: 10px 28px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s ease;
        }

        button:hover {
            background-color: #059669;
        }

        @media (max-width: 768px) {
            table {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <h2>🚨 Content</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <table>
            <tr>
                <td>Content</td>
                <td>
                    <input type="text" name="Content" placeholder="Enter phishing message or content" required>
                </td>
            </tr>

            <tr>
                <td>Threat Type</td>
                <td>
                    <!-- Input with typing + dropdown -->
                    <input list="threat-options" name="ThreatType" 
                           placeholder="Select or type Threat Type" required>

                    <datalist id="threat-options">
                        <option value="Phishing">
                        <option value="Fake Website">
                        <option value="Fraud Call">
                        <option value="Malware Link">
                        <option value="Social Media Scam">
                    </datalist>
                </td>
            </tr>

            <tr>
                <td>Description</td>
                <td>
                    <textarea name="Description" class="description-box"
                        placeholder="Describe the issue in detail"></textarea>
                </td>
            </tr>

            <tr>
                <td>Image</td>
                <td><input type="file" name="image"></td>
            </tr>

            <tr>
                <td>Link</td>
                <td>
                    <textarea name="Link" placeholder="Enter URL" required></textarea>
                </td>
            </tr>

            <tr>
                <td colspan="2" class="submit-btn">
                    <button type="submit">Submit Report</button>
                </td>
            </tr>

        </table>
    </form>

</body>
</html>
